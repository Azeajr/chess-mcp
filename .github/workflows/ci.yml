name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Engine-free test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          cache-dependency-glob: server/pyproject.toml
      - name: Run pytest (branch coverage via addopts)
        working-directory: server
        run: uv run pytest

  docker:
    name: Image builds and the server boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker compose build
      - name: Boot the container and confirm startup
        # `build` alone only catches Dockerfile errors; booting also catches a
        # runtime ImportError (e.g. a module missing from the image's COPY).
        run: |
          docker compose up -d
          for _ in $(seq 1 30); do
            if docker compose logs 2>&1 | grep -q "Application startup complete"; then
              echo "server started"; exit 0
            fi
            sleep 2
          done
          echo "::error::server did not start within 60s"
          docker compose logs
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down

  publish:
    name: Push image to GHCR
    needs: [test, docker]               # only publish if tests + build/boot pass
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/azeajr/chess-mcp
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub release
    needs: publish                       # only after the image is published
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            --generate-notes
