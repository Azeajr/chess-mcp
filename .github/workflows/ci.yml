name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node:
    name: Node — build, typecheck, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6   # version resolved from package.json "packageManager"
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Plugin skills in sync with dev skills (no drift)
        run: pnpm check:skills   # fix with `pnpm sync:skills` (.claude/skills → plugin/skills)
      - name: Build chess-tools (dist used by the smoke scripts)
        run: pnpm --filter @chess-mcp/chess-tools build
      - name: Typecheck all packages
        run: pnpm -r typecheck
      - name: Deterministic smoke suites (engine-free, no network)
        run: |
          node scripts/smoke-gametree.mjs
          node scripts/structure-accuracy.mjs
      - name: MCP stdio smoke (engine on, network assertions gated out)
        env:
          SMOKE_NETWORK: "0"   # skip live Lichess/Chess.com; engine + local paths still run
          EVAL_CACHE_DIR: "0"  # cold cache — CI must not depend on a warm eval store
        run: node apps/mcp-server/test/smoke-client.mjs

  release:
    name: GitHub release
    needs: node                          # plugin ships from the repo; gate on the product build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            --generate-notes
