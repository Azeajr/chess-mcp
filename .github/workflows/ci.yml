name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node:
    name: Node — build, typecheck, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6   # version resolved from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build chess-tools (dist used by the smoke scripts)
        run: pnpm --filter @chess-mcp/chess-tools build
      - name: Typecheck all packages
        run: pnpm -r typecheck
      - name: Deterministic smoke suites (engine-free, no network)
        run: |
          node scripts/smoke-gametree.mjs
          node scripts/structure-accuracy.mjs

  test:
    name: Engine-free test suite (legacy Python server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0  # no moving v8 major tag; pin exact
        with:
          cache-dependency-glob: server/pyproject.toml
      - name: Run pytest (branch coverage via addopts)
        working-directory: server
        run: uv run pytest

  release:
    name: GitHub release
    needs: node                          # plugin ships from the repo; gate on the product build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            --generate-notes
