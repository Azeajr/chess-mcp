services:
  chess-mcp:
    image: ghcr.io/azeajr/chess-mcp:latest
    build: ./server   # local fallback: `docker compose up -d --build`. Prebuilt: `docker compose pull`.
    ports:
      - "8000:8000"
    environment:
      FASTMCP_HOST: "0.0.0.0"   # bind all interfaces so the published port is reachable (also the image default; explicit here)
      ANALYSIS_DEPTH: "18"
      STOCKFISH_PATH: /usr/games/stockfish
      # GAP_BUDGET_S: "45"   # find_repertoire_gaps wall-clock budget (s); lower to ~25-30 if your MCP client's request timeout is under ~60s
    restart: unless-stopped
    # On XU4: uncomment to pin to A15 cores only
    # cpuset: "0-3"
